          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.10'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.11'
