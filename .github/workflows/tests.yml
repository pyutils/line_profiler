          install-extras: tests
          os: windows-latest
          arch: auto
        - python-version: '3.13'
          install-extras: tests
          os: ubuntu-24.04-arm
          arch: auto
        - python-version: '3.13'
          install-extras: tests
          os: windows-11-arm
          arch: auto
        - python-version: '3.10'
          install-extras: tests,optional
          os: ubuntu-latest
